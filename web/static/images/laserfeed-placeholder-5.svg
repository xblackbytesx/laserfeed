<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1006"/>
      <stop offset="100%" stop-color="#0a0603"/>
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff8a00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="orbit-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg5)"/>

  <!-- Subtle radial dot starfield -->
  <g fill="#ffb347" opacity="0.18">
    <circle cx="100" cy="60"  r="0.8"/>
    <circle cx="540" cy="80"  r="0.8"/>
    <circle cx="60"  cy="240" r="0.8"/>
    <circle cx="580" cy="280" r="0.8"/>
    <circle cx="200" cy="40"  r="0.6"/>
    <circle cx="440" cy="320" r="0.6"/>
    <circle cx="120" cy="320" r="0.6"/>
    <circle cx="500" cy="40"  r="0.6"/>
  </g>

  <!-- Concentric orbit rings centered -->
  <g fill="none" stroke="#ff8a00" stroke-linecap="round">
    <circle cx="320" cy="180" r="48"  stroke-width="1.5" opacity="0.85"/>
    <circle cx="320" cy="180" r="80"  stroke-width="1.2" opacity="0.6"/>
    <circle cx="320" cy="180" r="112" stroke-width="1"   opacity="0.4" stroke-dasharray="2 5"/>
    <circle cx="320" cy="180" r="144" stroke-width="1"   opacity="0.25" stroke-dasharray="1 6"/>
  </g>

  <!-- Diametric guidelines -->
  <g stroke="#ff8a00" stroke-width="0.6" opacity="0.25">
    <line x1="160" y1="180" x2="480" y2="180"/>
    <line x1="320" y1="20"  x2="320" y2="340"/>
  </g>

  <!-- Core glow -->
  <circle cx="320" cy="180" r="22" fill="url(#core-glow)"/>
  <!-- Core body -->
  <circle cx="320" cy="180" r="7" fill="#ffb347" filter="url(#orbit-glow)"/>
  <circle cx="320" cy="180" r="3" fill="#fff7e8"/>

  <!-- Tracked orbital satellites -->
  <circle cx="368" cy="180" r="3.5" fill="#ffb347" filter="url(#dot-glow)"/>
  <circle cx="320" cy="100" r="3"   fill="#ffb347" opacity="0.85" filter="url(#dot-glow)"/>
  <circle cx="263" cy="237" r="2.5" fill="#ffb347" opacity="0.7" filter="url(#dot-glow)"/>

  <!-- Telemetry tag -->
  <g font-family="'Courier New', Courier, monospace" fill="#ffb347" opacity="0.55">
    <text x="40" y="50" font-size="11" letter-spacing="2">TRK · 03</text>
    <text x="40" y="68" font-size="11" letter-spacing="2" opacity="0.6">AZ +048.2°</text>
    <text x="40" y="84" font-size="11" letter-spacing="2" opacity="0.6">EL +013.7°</text>
  </g>

  <!-- Wordmark -->
  <text x="320" y="338"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="bold"
    fill="#cc6f00" text-anchor="middle"
    letter-spacing="9" opacity="0.7">LASERFEED</text>
</svg>
