<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#05050c"/>
    </radialGradient>
    <linearGradient id="beam-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8003a" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#e8003a" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#ff4466" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#e8003a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e8003a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8003a" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#e8003a" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#ff4466" stop-opacity="0.9"/>
      <stop offset="65%"  stop-color="#e8003a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8003a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6666cc" stroke-width="1" fill="none">
    <line x1="0"   y1="72"  x2="640" y2="72"/>
    <line x1="0"   y1="144" x2="640" y2="144"/>
    <line x1="0"   y1="216" x2="640" y2="216"/>
    <line x1="0"   y1="288" x2="640" y2="288"/>
    <line x1="128" y1="0"   x2="128" y2="360"/>
    <line x1="256" y1="0"   x2="256" y2="360"/>
    <line x1="384" y1="0"   x2="384" y2="360"/>
    <line x1="512" y1="0"   x2="512" y2="360"/>
  </g>

  <!-- Horizontal laser beam (glow layer) -->
  <rect x="0" y="167" width="640" height="26" fill="url(#beam-h)" opacity="0.25" filter="url(#glow-soft)"/>
  <!-- Horizontal laser beam (core) -->
  <rect x="0" y="173" width="640" height="14" fill="url(#beam-h)" opacity="0.9"/>

  <!-- Vertical laser beam (glow layer) -->
  <rect x="307" y="0" width="26" height="360" fill="url(#beam-v)" opacity="0.18" filter="url(#glow-soft)"/>
  <!-- Vertical laser beam (core) -->
  <rect x="313" y="0" width="14" height="360" fill="url(#beam-v)" opacity="0.7"/>

  <!-- Center crosshair ring (outer) -->
  <circle cx="320" cy="180" r="42" fill="none" stroke="#e8003a" stroke-width="1.5" opacity="0.5"/>
  <!-- Center crosshair ring (inner) -->
  <circle cx="320" cy="180" r="22" fill="none" stroke="#e8003a" stroke-width="1" opacity="0.7"/>

  <!-- Crosshair tick marks -->
  <line x1="320" y1="130" x2="320" y2="140" stroke="#e8003a" stroke-width="2" opacity="0.8"/>
  <line x1="320" y1="220" x2="320" y2="230" stroke="#e8003a" stroke-width="2" opacity="0.8"/>
  <line x1="270" y1="180" x2="280" y2="180" stroke="#e8003a" stroke-width="2" opacity="0.8"/>
  <line x1="360" y1="180" x2="370" y2="180" stroke="#e8003a" stroke-width="2" opacity="0.8"/>

  <!-- Center dot -->
  <circle cx="320" cy="180" r="6" fill="#ff2244" filter="url(#glow-strong)"/>
  <circle cx="320" cy="180" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Corner brackets - top left -->
  <path d="M60,60 L60,90 M60,60 L90,60" fill="none" stroke="#e8003a" stroke-width="2" opacity="0.6"/>
  <!-- Corner brackets - top right -->
  <path d="M580,60 L580,90 M580,60 L550,60" fill="none" stroke="#e8003a" stroke-width="2" opacity="0.6"/>
  <!-- Corner brackets - bottom left -->
  <path d="M60,300 L60,270 M60,300 L90,300" fill="none" stroke="#e8003a" stroke-width="2" opacity="0.6"/>
  <!-- Corner brackets - bottom right -->
  <path d="M580,300 L580,270 M580,300 L550,300" fill="none" stroke="#e8003a" stroke-width="2" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="320" y="340"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    font-weight="bold"
    fill="#cc1133"
    text-anchor="middle"
    letter-spacing="10"
    filter="url(#text-glow)"
    opacity="0.85">LASERFEED</text>
</svg>
