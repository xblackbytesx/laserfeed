<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#02161a"/>
      <stop offset="100%" stop-color="#000608"/>
    </radialGradient>
    <radialGradient id="aperture-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2af0d8" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#0a8a82" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a8a82" stop-opacity="0"/>
    </radialGradient>
    <filter id="aperture-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg7)"/>

  <!-- Sparse grid -->
  <g stroke="#0a3a3a" stroke-width="0.6" opacity="0.5">
    <line x1="0" y1="60"  x2="640" y2="60"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
  </g>

  <!-- Outer aperture ring -->
  <circle cx="320" cy="180" r="120" fill="none" stroke="#2af0d8" stroke-width="1.5" opacity="0.55"/>
  <circle cx="320" cy="180" r="118" fill="none" stroke="#2af0d8" stroke-width="0.6" opacity="0.3"/>

  <!-- Aperture blades — six triangular wedges rotated around center -->
  <!-- Each blade is a triangle from a point on the outer ring to two flanking points further around -->
  <g fill="#0a8a82" opacity="0.85" stroke="#2af0d8" stroke-width="1.2" stroke-linejoin="round">
    <!-- 6 blades, 60° apart, each rotated -->
    <g transform="rotate(0 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
    <g transform="rotate(60 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
    <g transform="rotate(120 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
    <g transform="rotate(180 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
    <g transform="rotate(240 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
    <g transform="rotate(300 320 180)">
      <path d="M320,60 L394,180 L262,210 Z"/>
    </g>
  </g>

  <!-- Inner glow circle through aperture opening -->
  <circle cx="320" cy="180" r="50" fill="url(#aperture-core)"/>

  <!-- Aperture core highlight -->
  <circle cx="320" cy="180" r="10" fill="#2af0d8" filter="url(#aperture-glow)"/>
  <circle cx="320" cy="180" r="4"  fill="#e6fffb"/>

  <!-- Tick marks around the outer ring at cardinal points -->
  <g stroke="#2af0d8" stroke-width="2" opacity="0.7" stroke-linecap="round">
    <line x1="320" y1="48"  x2="320" y2="60"/>
    <line x1="320" y1="300" x2="320" y2="312"/>
    <line x1="188" y1="180" x2="200" y2="180"/>
    <line x1="440" y1="180" x2="452" y2="180"/>
  </g>

  <!-- Telemetry -->
  <g font-family="'Courier New', Courier, monospace" fill="#2af0d8" opacity="0.55">
    <text x="40" y="50" font-size="11" letter-spacing="2">f / 1.4</text>
    <text x="40" y="68" font-size="11" letter-spacing="2" opacity="0.65">FOCUS · LOCK</text>
  </g>
  <text x="600" y="50" text-anchor="end"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#2af0d8" opacity="0.5" letter-spacing="2">CAP · 07</text>

  <!-- Wordmark -->
  <text x="320" y="338"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="bold"
    fill="#0e9b8a" text-anchor="middle"
    letter-spacing="9" opacity="0.75">LASERFEED</text>
</svg>
