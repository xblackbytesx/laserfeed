  <!-- Signal waveform — oscilloscope style -->
  <!-- Glow layer -->
  <polyline
    points="0,180 60,180 90,180 110,120 130,240 150,180 200,180 220,180 240,100 260,260 280,180 340,180 360,180 380,130 400,230 420,180 480,180 500,180 520,110 540,250 560,180 640,180"
    fill="none" stroke="#00e5ff" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"
    opacity="0.25" filter="url(#cyan-glow)"/>
  <!-- Core line -->
  <polyline
    points="0,180 60,180 90,180 110,120 130,240 150,180 200,180 220,180 240,100 260,260 280,180 340,180 360,180 380,130 400,230 420,180 480,180 500,180 520,110 540,250 560,180 640,180"
    fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
