<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg2" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#000508"/>
    </radialGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#00b8d9" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cyan-glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="640" height="360"/>
    </clipPath>
  </defs>

  <rect width="640" height="360" fill="url(#bg2)"/>

