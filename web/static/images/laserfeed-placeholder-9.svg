<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg9" cx="20%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#0f0820"/>
      <stop offset="100%" stop-color="#04020c"/>
    </radialGradient>
    <linearGradient id="sweep-cone" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#9d5dff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#9d5dff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9d5dff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep-edge" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#c89dff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c89dff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="origin-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#c89dff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#9d5dff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9d5dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sweep-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg9)"/>

  <!-- Range arcs from origin (80, 300) -->
  <g fill="none" stroke="#5d3d8a" stroke-width="0.8" opacity="0.45">
    <path d="M 80,180 A 120,120 0 0,1 200,300"/>
    <path d="M 80,120 A 180,180 0 0,1 260,300"/>
    <path d="M 80,60  A 240,240 0 0,1 320,300"/>
    <path d="M 80,0   A 300,300 0 0,1 380,300"/>
  </g>

  <!-- Bearing radials from origin -->
  <g stroke="#5d3d8a" stroke-width="0.6" opacity="0.3">
    <line x1="80" y1="300" x2="220" y2="20"/>
    <line x1="80" y1="300" x2="380" y2="20"/>
    <line x1="80" y1="300" x2="540" y2="20"/>
    <line x1="80" y1="300" x2="620" y2="160"/>
  </g>

  <!-- Sweep cone — main body (triangle from origin) -->
  <path d="M 80,300 L 480,40 L 580,180 Z" fill="url(#sweep-cone)"/>

  <!-- Leading edge (the bright sweep line) -->
  <line x1="80" y1="300" x2="580" y2="180"
    stroke="url(#sweep-edge)" stroke-width="2.2" opacity="0.85"
    filter="url(#sweep-glow)"/>
  <line x1="80" y1="300" x2="580" y2="180"
    stroke="#e6d4ff" stroke-width="0.8" opacity="0.9"/>

  <!-- Detected blips along/inside the cone -->
  <g>
    <circle cx="220" cy="220" r="4"   fill="#c89dff" filter="url(#sweep-glow)"/>
    <circle cx="220" cy="220" r="1.5" fill="#ffffff"/>
    <circle cx="340" cy="160" r="3.5" fill="#c89dff" opacity="0.9" filter="url(#sweep-glow)"/>
    <circle cx="340" cy="160" r="1.2" fill="#ffffff"/>
    <circle cx="430" cy="120" r="3"   fill="#c89dff" opacity="0.7" filter="url(#sweep-glow)"/>
    <circle cx="430" cy="120" r="1"   fill="#ffffff"/>
  </g>

  <!-- Phantom blips (faded, outside cone) -->
  <g fill="#9d5dff" opacity="0.25">
    <circle cx="500" cy="240" r="2.5"/>
    <circle cx="160" cy="80"  r="2"/>
    <circle cx="280" cy="60"  r="2"/>
  </g>

  <!-- Origin emitter -->
  <circle cx="80" cy="300" r="22" fill="url(#origin-glow)"/>
  <circle cx="80" cy="300" r="6"  fill="#c89dff" filter="url(#sweep-glow)"/>
  <circle cx="80" cy="300" r="2"  fill="#ffffff"/>

  <!-- Telemetry -->
  <g font-family="'Courier New', Courier, monospace" fill="#c89dff" opacity="0.6">
    <text x="600" y="50"  text-anchor="end" font-size="11" letter-spacing="2">SWEEP · 09</text>
    <text x="600" y="68"  text-anchor="end" font-size="11" letter-spacing="2" opacity="0.65">BRG 062°</text>
    <text x="600" y="86"  text-anchor="end" font-size="11" letter-spacing="2" opacity="0.65">RNG 4.2 km</text>
  </g>

  <!-- Wordmark -->
  <text x="320" y="338"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="bold"
    fill="#7d4dc8" text-anchor="middle"
    letter-spacing="9" opacity="0.7">LASERFEED</text>
</svg>
