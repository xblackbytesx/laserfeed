<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg8" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#020611"/>
    </radialGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hub-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg8)"/>

  <!-- Faint dot starfield -->
  <g fill="#5dadff" opacity="0.18">
    <circle cx="60"  cy="50"  r="0.7"/>
    <circle cx="580" cy="60"  r="0.7"/>
    <circle cx="40"  cy="320" r="0.7"/>
    <circle cx="600" cy="310" r="0.7"/>
    <circle cx="220" cy="30"  r="0.6"/>
    <circle cx="500" cy="40"  r="0.6"/>
    <circle cx="80"  cy="200" r="0.6"/>
    <circle cx="610" cy="180" r="0.6"/>
    <circle cx="180" cy="330" r="0.6"/>
    <circle cx="460" cy="340" r="0.6"/>
  </g>

  <!-- Connection lines first (so dots appear on top) -->
  <g stroke="#3d7dd6" stroke-width="0.9" fill="none" stroke-linecap="round">
    <!-- From central hub (320,180) -->
    <line x1="320" y1="180" x2="170" y2="100" opacity="0.55"/>
    <line x1="320" y1="180" x2="470" y2="110" opacity="0.55"/>
    <line x1="320" y1="180" x2="120" y2="220" opacity="0.55"/>
    <line x1="320" y1="180" x2="510" y2="240" opacity="0.55"/>
    <line x1="320" y1="180" x2="240" y2="270" opacity="0.55"/>
    <line x1="320" y1="180" x2="400" y2="280" opacity="0.55"/>
    <line x1="320" y1="180" x2="220" y2="160" opacity="0.5"/>
    <line x1="320" y1="180" x2="420" y2="180" opacity="0.5"/>
    <!-- Inter-node links -->
    <line x1="170" y1="100" x2="220" y2="160" opacity="0.4"/>
    <line x1="470" y1="110" x2="420" y2="180" opacity="0.4"/>
    <line x1="120" y1="220" x2="240" y2="270" opacity="0.35"/>
    <line x1="510" y1="240" x2="400" y2="280" opacity="0.35"/>
    <line x1="240" y1="270" x2="400" y2="280" opacity="0.3"/>
    <line x1="170" y1="100" x2="470" y2="110" opacity="0.25"/>
    <!-- Outer satellites -->
    <line x1="80"  y1="60"  x2="170" y2="100" opacity="0.3"/>
    <line x1="560" y1="70"  x2="470" y2="110" opacity="0.3"/>
    <line x1="80"  y1="300" x2="120" y2="220" opacity="0.3"/>
    <line x1="570" y1="310" x2="510" y2="240" opacity="0.3"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Outer satellites (small) -->
    <circle cx="80"  cy="60"  r="2.5" fill="#5dadff" opacity="0.7" filter="url(#node-glow)"/>
    <circle cx="560" cy="70"  r="2.5" fill="#5dadff" opacity="0.7" filter="url(#node-glow)"/>
    <circle cx="80"  cy="300" r="2.5" fill="#5dadff" opacity="0.7" filter="url(#node-glow)"/>
    <circle cx="570" cy="310" r="2.5" fill="#5dadff" opacity="0.7" filter="url(#node-glow)"/>

    <!-- Mid-ring nodes -->
    <circle cx="170" cy="100" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="470" cy="110" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="120" cy="220" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="510" cy="240" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="240" cy="270" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="400" cy="280" r="4" fill="#7dc4ff" filter="url(#node-glow)"/>
    <circle cx="220" cy="160" r="3.5" fill="#7dc4ff" opacity="0.85" filter="url(#node-glow)"/>
    <circle cx="420" cy="180" r="3.5" fill="#7dc4ff" opacity="0.85" filter="url(#node-glow)"/>

    <!-- Central hub -->
    <circle cx="320" cy="180" r="14" fill="none" stroke="#5dadff" stroke-width="1" opacity="0.5"/>
    <circle cx="320" cy="180" r="8"  fill="#5dadff" filter="url(#hub-glow)"/>
    <circle cx="320" cy="180" r="3"  fill="#eaf4ff"/>
  </g>

  <!-- Telemetry -->
  <g font-family="'Courier New', Courier, monospace" fill="#5dadff" opacity="0.6">
    <text x="40" y="50" font-size="11" letter-spacing="2">NODES · 14</text>
    <text x="40" y="68" font-size="11" letter-spacing="2" opacity="0.7">LINKS · 17</text>
  </g>

  <!-- Wordmark -->
  <text x="320" y="338"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="bold"
    fill="#3d7dd6" text-anchor="middle"
    letter-spacing="9" opacity="0.75">LASERFEED</text>
</svg>
