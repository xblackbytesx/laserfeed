name: laserfeed

networks:
  proxy:
    name: proxy
    external: true
  internal:
    internal: true
  # Uncomment together with the laserfeed-chrome service below. The internal
  # network has no internet access, so the browser needs this extra
  # outbound-capable network to load pages.
  # chrome-egress: {}

volumes:
  laserfeed-database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/laserfeed/database

services:
  laserfeed-db:
    image: postgres:17-alpine
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    labels:
      - "traefik.enable=false"
    environment:
      POSTGRES_USER: laserfeed
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: laserfeed
    volumes:
      - laserfeed-database:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laserfeed"]
      interval: 5s
      timeout: 5s
      retries: 10

  laserfeed-app:
    container_name: laserfeed-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - proxy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://laserfeed:${DB_PASSWORD}@laserfeed-db:5432/laserfeed?sslmode=disable
      CSRF_AUTH_KEY: ${CSRF_AUTH_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      PORT: "8080"
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      JS_RENDER_WS_URL: ${JS_RENDER_WS_URL:-}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      laserfeed-db:
        condition: service_healthy
    restart: unless-stopped

  # Optional: headless browser for feeds with "Render JavaScript" enabled.
  # Uncomment this service and the chrome-egress network above, then set
  # JS_RENDER_WS_URL=ws://laserfeed-chrome:9222/ in .env.
  #
  # SECURITY: pages rendered here execute arbitrary JavaScript and fetch
  # subresources with the browser's own network stack, outside the app's
  # SSRF guard (the app pre-checks only the article URL itself). Keep this
  # container off networks that can reach sensitive internal services.
  # laserfeed-chrome:
  #   container_name: laserfeed-chrome
  #   image: chromedp/headless-shell:latest
  #   security_opt:
  #     - no-new-privileges:true
  #   networks:
  #     - internal       # reachable by the app
  #     - chrome-egress  # outbound internet for page loads
  #   restart: unless-stopped
